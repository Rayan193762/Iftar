<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iftar Invitation</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f8f9fa;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    h1 {
      color: #d63384;
    }

    button {
      padding: 10px 20px;
      font-size: 18px;
      border: none;
      border-radius: 5px;
      background-color: #0d6efd;
      color: white;
      cursor: pointer;
      margin-top: 20px;
    }

    button:hover {
      background-color: #0b5ed7;
    }

    p {
      margin-top: 20px;
      font-size: 20px;
      color: #212529;
    }
  </style>
</head>
<body>

  <h1>Click Below to Get Your Invitation!</h1>
  <button onclick="invite()">Get Invitation</button>
  <p id="message"></p>

  <script>
    function invite() {
      let name = prompt("Please enter your name:");
      if (name && name.trim() !== "") {
        document.getElementById("message").textContent =
          name + " is invited to the Iftar Party on 12th of March 2026 at The Educators Samundri!";
      } else {
        alert("You need to enter your name to see the invitation.");
      }
    }
  </script>

</body>
</html>
